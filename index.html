<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Inteligente - Restaurante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-xl">
        <header class="mb-6 border-b pb-4">
            <h1 class="text-3xl font-bold text-gray-800">Control de Insumos y Compras</h1>
            <p class="text-blue-600 font-medium italic">Ajuste automático por unidad de empaque</p>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-blue-50 p-6 rounded-lg border border-blue-200">
            <div class="md:col-span-2">
                <label class="block text-xs font-bold uppercase text-gray-600">Insumo</label>
                <input type="text" id="producto" class="w-full p-2 border rounded" placeholder="Ej: Huevos">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600 italic text-blue-700">Viene por (Ej: 30)</label>
                <input type="number" id="unidadEmpaque" class="w-full p-2 border border-blue-400 rounded bg-white" value="30">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600">Stock Reserva</label>
                <input type="number" id="stockBasico" class="w-full p-2 border rounded" value="15">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600">Inv. Inicial</label>
                <input type="number" id="invInicial" class="w-full p-2 border rounded" value="0">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600 text-green-700">Entradas (+)</label>
                <input type="number" id="entradas" class="w-full p-2 border rounded" value="0">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600 text-red-700">Salidas (-)</label>
                <input type="number" id="salidas" class="w-full p-2 border rounded" value="0">
            </div>
            <div class="md:col-span-2 flex items-end">
                <button onclick="agregarAlKardex()" class="w-full bg-blue-800 text-white font-bold py-2 rounded hover:bg-blue-900 shadow">
                    Calcular y Registrar
                </button>
            </div>
        </div>

        <div class="overflow-x-auto mb-6">
            <table class="w-full border-collapse" id="tablaKardex">
                <thead class="bg-gray-800 text-white text-sm">
                    <tr>
                        <th class="p-3 text-left">Producto</th>
                        <th class="p-3">Existencia</th>
                        <th class="p-3">Reserva</th>
                        <th class="p-3">Faltante Real</th>
                        <th class="p-3 bg-orange-600 text-white">PEDIDO SUGERIDO (Empaques)</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="text-center divide-y divide-gray-200"></tbody>
            </table>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onclick="exportarExcel()" class="bg-gray-700 text-white font-bold py-3 rounded-lg hover:bg-black transition">
                📥 Descargar Excel para Auditoría
            </button>
            <button onclick="enviarWhatsApp()" class="bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 shadow-lg transition">
                📲 Enviar Compras por WhatsApp
            </button>
        </div>

        <footer class="mt-12 text-center text-xs text-gray-400">
            app desarrollada por vibras positivas derecho de autor (3117700431)
        </footer>
    </div>

    <script>
        let inventario = [];

        function agregarAlKardex() {
            const prod = document.getElementById('producto').value;
            const empaque = parseFloat(document.getElementById('unidadEmpaque').value) || 1;
            const basico = parseFloat(document.getElementById('stockBasico').value) || 0;
            const inicial = parseFloat(document.getElementById('invInicial').value) || 0;
            const ent = parseFloat(document.getElementById('entradas').value) || 0;
            const sal = parseFloat(document.getElementById('salidas').value) || 0;

            if(!prod) return alert("Nombre del insumo obligatorio");

            const existencia = inicial + ent - sal;
            const faltanteReal = basico > existencia ? (basico - existencia) : 0;
            
            // Lógica de Redondeo: ¿Cuántos empaques completos necesito para cubrir el faltante?
            // Math.ceil(14 / 30) = 1 panal.
            const pedidoSugerido = faltanteReal > 0 ? Math.ceil(faltanteReal / empaque) : 0;

            inventario.push({
                producto: prod,
                unidad_empaque: empaque,
                existencia: existencia,
                reserva: basico,
                faltante_unidades: faltanteReal,
                comprar_empaques: pedidoSugerido
            });

            actualizarVista();
            limpiar();
        }

        function actualizarVista() {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = "";
            inventario.forEach(item => {
                cuerpo.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-3 text-left font-bold">${item.producto}</td>
                        <td class="p-3 text-blue-600 font-bold">${item.existencia}</td>
                        <td class="p-3">${item.reserva}</td>
                        <td class="p-3 text-red-500">${item.faltante_unidades}</td>
                        <td class="p-3 font-extrabold text-orange-700">${item.comprar_empaques} unidad(es) de ${item.unidad_empaque}</td>
                    </tr>
                `;
            });
        }

        function exportarExcel() {
            if(inventario.length === 0) return;
            const ws = XLSX.utils.json_to_sheet(inventario);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventario");
            XLSX.writeFile(wb, "Reporte_Inventario_VibrasPositivas.xlsx");
        }

        function enviarWhatsApp() {
            if(inventario.length === 0) return;
            let msg = `*LISTA DE COMPRAS - REPOSICIÓN*%0A`;
            msg += `---------------------------------%0A`;
            
            inventario.forEach(i => {
                if(i.comprar_empaques > 0) {
                    msg += `✅ *${i.producto}*: Comprar *${i.comprar_empaques}* unidad(es) (Presentación de ${i.unidad_empaque})%0A`;
                }
            });

            window.open(`https://wa.me/3117700431?text=${msg}`, '_blank');
        }

        function limpiar() {
            document.getElementById('producto').value = "";
            document.getElementById('invInicial').value = "0";
            document.getElementById('entradas').value = "0";
            document.getElementById('salidas').value = "0";
        }
    </script>
</body>
</html>
