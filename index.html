<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Profesional - Vibras Positivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-2xl border-t-8 border-indigo-700">
        <header class="flex justify-between items-center mb-8 border-b pb-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800">Control de Insumos</h1>
                <p class="text-indigo-600 font-bold">Gestión de Compras y Unidades</p>
            </div>
            <div class="text-right text-xs text-gray-500 font-mono" id="fechaActual"></div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8 bg-indigo-50 p-6 rounded-xl border border-indigo-100">
            <div class="lg:col-span-2">
                <label class="block text-xs font-bold text-slate-600 uppercase">Insumo</label>
                <input type="text" id="producto" class="w-full p-2 border-2 rounded focus:border-indigo-500 outline-none" placeholder="Ej: Huevos">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase">Unidad de Medida</label>
                <select id="unidadMedida" class="w-full p-2 border-2 rounded bg-white outline-none">
                    <option value="Unidades">Unidades</option>
                    <option value="Panales">Panales</option>
                    <option value="Kilos">Kilos</option>
                    <option value="Bultos">Bultos</option>
                    <option value="Cajas">Cajas</option>
                    <option value="Paquetes">Paquetes</option>
                    <option value="Gramos">Gramos</option>
                    <option value="Litros">Litros</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase">Reserva Mínima</label>
                <input type="number" id="stockBasico" class="w-full p-2 border-2 rounded" value="15">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase">Conteo Final</label>
                <input type="number" id="invFinal" class="w-full p-2 border-2 border-indigo-300 rounded font-bold text-indigo-700" placeholder="0">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase">Contenido Empaque</label>
                <input type="number" id="unidadEmpaque" class="w-full p-2 border-2 rounded" value="30">
            </div>
            <div class="lg:col-span-6">
                <button onclick="registrar()" class="w-full bg-indigo-700 text-white font-black py-3 rounded-lg hover:bg-indigo-800 shadow-lg transition uppercase tracking-wider">
                    Registrar Movimiento del Día
                </button>
            </div>
        </div>

        <div class="overflow-x-auto rounded-lg border border-slate-200 mb-8 bg-white">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-white text-[11px] uppercase tracking-widest">
                    <tr>
                        <th class="p-4">Producto</th>
                        <th class="p-4 text-center">Físico Actual</th>
                        <th class="p-4 text-center">Reserva</th>
                        <th class="p-4 text-center bg-orange-600">PEDIDO SUGERIDO</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="text-sm divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <button onclick="descargarExcel()" class="bg-slate-200 text-slate-800 font-bold py-4 rounded-xl hover:bg-slate-300 transition flex justify-center items-center gap-2">
                📂 Exportar a Excel
            </button>
            <button onclick="enviarWS()" class="bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 shadow-xl transition flex justify-center items-center gap-2">
                💬 Pedir por WhatsApp
            </button>
            <button onclick="resetear()" class="bg-red-100 text-red-600 font-bold py-4 rounded-xl hover:bg-red-600 hover:text-white transition">
                🔄 Reiniciar Todo
            </button>
        </div>

        <footer class="mt-12 pt-6 border-t text-center text-[10px] text-slate-400 uppercase tracking-widest font-bold">
            app desarrollada por vibras positivas derecho de autor (3117700431)
        </footer>
    </div>

    <script>
        // Cargar datos guardados al iniciar
        let inventario = JSON.parse(localStorage.getItem('inventarioVibras')) || [];
        document.getElementById('fechaActual').innerText = new Date().toLocaleString();

        function registrar() {
            const p = document.getElementById('producto').value;
            const u = document.getElementById('unidadMedida').value;
            const r = parseFloat(document.getElementById('stockBasico').value) || 0;
            const f = parseFloat(document.getElementById('invFinal').value) || 0;
            const e = parseFloat(document.getElementById('unidadEmpaque').value) || 1;

            if(!p) return alert("Escribe el nombre del producto");

            const faltante = r > f ? (r - f) : 0;
            const cantidadEmpaques = faltante > 0 ? Math.ceil(faltante / e) : 0;

            const item = {
                producto: p,
                unidad: u,
                fisico: f,
                reserva: r,
                faltante: faltante,
                pedido: cantidadEmpaques,
                empaqueSize: e
            };

            // Evitar duplicados
            const idx = inventario.findIndex(x => x.producto.toLowerCase() === p.toLowerCase());
            if(idx > -1) inventario[idx] = item;
            else inventario.push(item);

            guardarYRenderizar();
            document.getElementById('producto').value = "";
            document.getElementById('invFinal').value = "";
            document.getElementById('producto').focus();
        }

        function guardarYRenderizar() {
            localStorage.setItem('inventarioVibras', JSON.stringify(inventario));
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = "";
            
            inventario.forEach((i, index) => {
                cuerpo.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-bold border-r">${i.producto}</td>
                        <td class="p-4 text-center font-semibold text-blue-600">${i.fisico} unid.</td>
                        <td class="p-4 text-center text-slate-400 italic">${i.reserva} unid.</td>
                        <td class="p-4 text-center font-black bg-orange-50 text-orange-700">
                            ${i.pedido > 0 ? `Comprar ${i.pedido} ${i.unidad} (de ${i.empaqueSize})` : '✅ STOCK AL DÍA'}
                        </td>
                    </tr>
                `;
            });
        }

        function enviarWS() {
            if(inventario.length === 0) return;
            let msg = `*ORDEN DE COMPRA - VIBRAS POSITIVAS*%0A`;
            msg += `-----------------------------------%0A`;
            inventario.filter(x => x.pedido > 0).forEach(x => {
                msg += `👉 *${x.producto}*: Comprar *${x.pedido} ${x.unidad}* (Presentación de ${x.empaqueSize})%0A`;
            });
            window.open(`https://wa.me/3117700431?text=${msg}`, '_blank');
        }

        function descargarExcel() {
            if(inventario.length === 0) return;
            const ws = XLSX.utils.json_to_sheet(inventario);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventario_Restaurante");
            XLSX.writeFile(wb, `Inventario_${new Date().toLocaleDateString()}.xlsx`);
        }

        function resetear() {
            if(confirm("¿Seguro que quieres borrar todo para iniciar un nuevo conteo?")) {
                inventario = [];
                guardarYRenderizar();
            }
        }

        // Renderizar al cargar la página
        guardarYRenderizar();
    </script>
</body>
</html>
