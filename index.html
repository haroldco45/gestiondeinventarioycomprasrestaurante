<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reposición - Vibras Positivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-2xl border-t-8 border-indigo-600">
        <header class="mb-8">
            <h1 class="text-3xl font-black text-slate-800">Control de Existencias</h1>
            <p class="text-slate-500">Alimenta el inventario final y el sistema calculará la compra.</p>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 bg-indigo-50 p-6 rounded-xl border border-indigo-100">
            <div class="col-span-1 md:col-span-2">
                <label class="block text-sm font-bold text-slate-700 mb-1">Insumo / Materia Prima</label>
                <input type="text" id="producto" class="w-full p-3 border-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="Ej: Huevos, Arroz, Carne...">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Stock de Reserva (Lo que DEBE haber)</label>
                <input type="number" id="stockBasico" class="w-full p-3 border-2 rounded-lg outline-none" placeholder="15">
            </div>

            <div>
                <label class="block text-sm font-bold text-indigo-700 mb-1">Inventario Final (Lo que CONTÉ hoy)</label>
                <input type="number" id="invFinal" class="w-full p-3 border-2 border-indigo-300 rounded-lg outline-none bg-white font-bold text-lg" placeholder="0">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Presentación de Compra (Ej: 30)</label>
                <input type="number" id="unidadEmpaque" class="w-full p-3 border-2 rounded-lg outline-none" value="30">
            </div>

            <div class="flex items-end">
                <button onclick="procesarConteo()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-lg hover:bg-indigo-700 transition-all shadow-lg transform hover:scale-[1.02]">
                    REGISTRAR CONTEO
                </button>
            </div>
        </div>

        <div class="overflow-x-auto rounded-lg border border-slate-200 mb-6">
            <table class="w-full text-left" id="tablaKardex">
                <thead class="bg-slate-800 text-white uppercase text-xs">
                    <tr>
                        <th class="p-4">Producto</th>
                        <th class="p-4 text-center">Físico Actual</th>
                        <th class="p-4 text-center">Reserva</th>
                        <th class="p-4 text-center text-orange-400">PEDIDO (WhatsApp)</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="text-slate-700 divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onclick="exportarExcel()" class="bg-slate-200 text-slate-800 font-bold py-3 rounded-xl hover:bg-slate-300 flex justify-center items-center gap-2">
                📂 Descargar Kardex (Excel)
            </button>
            <button onclick="enviarWhatsApp()" class="bg-green-500 text-white font-bold py-3 rounded-xl hover:bg-green-600 shadow-lg flex justify-center items-center gap-2">
                💬 Enviar Pedido a Compras
            </button>
        </div>

        <footer class="mt-12 text-center text-[10px] text-slate-400 tracking-widest uppercase">
            app desarrollada por vibras positivas derecho de autor (3117700431)
        </footer>
    </div>

    <script>
        let datosInventario = [];

        function procesarConteo() {
            const prod = document.getElementById('producto').value;
            const reserva = parseFloat(document.getElementById('stockBasico').value) || 0;
            const fisico = parseFloat(document.getElementById('invFinal').value) || 0;
            const empaque = parseFloat(document.getElementById('unidadEmpaque').value) || 1;

            if(!prod) return alert("Escribe el nombre del producto");

            // Cálculo: ¿Cuánto falta para llegar a la reserva?
            const faltanteReal = reserva > fisico ? (reserva - fisico) : 0;
            
            // Cálculo: ¿Cuántos empaques completos pido?
            const unidadesAPedir = faltanteReal > 0 ? Math.ceil(faltanteReal / empaque) : 0;

            datosInventario.push({
                producto: prod,
                existencia_fisica: fisico,
                stock_reserva: reserva,
                faltante_real: faltanteReal,
                empaques_a_comprar: unidadesAPedir,
                unidad_presentacion: empaque
            });

            actualizarVista();
            limpiar();
        }

        function actualizarVista() {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = "";
            datosInventario.forEach(item => {
                cuerpo.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 font-bold border-r text-slate-900">${item.producto}</td>
                        <td class="p-4 text-center text-blue-600 font-semibold">${item.existencia_fisica}</td>
                        <td class="p-4 text-center text-slate-400">${item.stock_reserva}</td>
                        <td class="p-4 text-center font-black text-orange-600 bg-orange-50">
                            ${item.empaques_a_comprar > 0 ? item.empaques_a_comprar + ' de ' + item.unidad_presentacion : 'OK'}
                        </td>
                    </tr>
                `;
            });
        }

        function exportarExcel() {
            if(datosInventario.length === 0) return alert("Sin datos");
            const ws = XLSX.utils.json_to_sheet(datosInventario);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Kardex_Fisico");
            XLSX.writeFile(wb, "Inventario_Fisico_Restaurante.xlsx");
        }

        function enviarWhatsApp() {
            if(datosInventario.length === 0) return;
            let msg = `*REPORTE DE COMPRAS (VIBRAS POSITIVAS)*%0A`;
            msg += `---------------------------------%0A`;
            
            datosInventario.forEach(i => {
                if(i.empaques_a_comprar > 0) {
                    msg += `🔸 *${i.producto}*: Pedir *${i.empaques_a_comprar}* (Unidad de ${i.unidad_presentacion})%0A`;
                }
            });

            window.open(`https://wa.me/3117700431?text=${msg}`, '_blank');
        }

        function limpiar() {
            document.getElementById('producto').value = "";
            document.getElementById('invFinal').value = "";
            document.getElementById('producto').focus();
        }
    </script>
</body>
</html>
