<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Inventario y Compras - Restaurante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-xl shadow-2xl">
        <header class="border-b pb-4 mb-6">
            <h1 class="text-3xl font-extrabold text-slate-800">Control de Materia Prima</h1>
            <p class="text-gray-500">Gestión de Existencias y Reposición de Reserva</p>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 bg-slate-50 p-6 rounded-lg border">
            <div class="col-span-1">
                <label class="block text-sm font-bold text-gray-700 mb-1">Insumo / Producto</label>
                <input type="text" id="producto" class="w-full border-2 p-2 rounded-md focus:border-blue-500 outline-none" placeholder="Ej: Carne de Res">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Stock de Reserva (Básico)</label>
                <input type="number" id="stockBasico" class="w-full border-2 p-2 rounded-md focus:border-blue-500 outline-none" value="5">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Inv. Inicial</label>
                <input type="number" id="invInicial" class="w-full border-2 p-2 rounded-md outline-none" value="0">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Entradas (Compras)</label>
                <input type="number" id="entradas" class="w-full border-2 p-2 rounded-md outline-none" value="0">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Salidas (Consumo)</label>
                <input type="number" id="salidas" class="w-full border-2 p-2 rounded-md outline-none" value="0">
            </div>
            <div class="flex items-end">
                <button onclick="agregarAlKardex()" class="w-full bg-indigo-600 text-white font-bold py-2 rounded-md hover:bg-indigo-700 shadow-lg">
                    Registrar Movimiento
                </button>
            </div>
        </div>

        <div class="overflow-x-auto mb-6">
            <table class="w-full text-left border-collapse" id="tablaKardex">
                <thead>
                    <tr class="bg-slate-800 text-white">
                        <th class="p-3 border">Producto</th>
                        <th class="p-3 border">Stock Reserva</th>
                        <th class="p-3 border">Existencia Final</th>
                        <th class="p-3 border">Faltante (WhatsApp)</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="text-gray-700">
                    </tbody>
            </table>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onclick="exportarExcel()" class="bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 flex justify-center items-center gap-2">
                Descargar Kardex (Excel)
            </button>
            <button onclick="enviarWhatsApp()" class="bg-green-500 text-white font-bold py-3 rounded-lg hover:bg-green-600 flex justify-center items-center gap-2">
                Enviar Pedido Reposición (WhatsApp)
            </button>
        </div>

        <footer class="mt-12 pt-6 border-t text-center text-sm text-gray-400">
            app desarrollada por vibras positivas derecho de autor (3117700431)
        </footer>
    </div>

    <script>
        let inventarioTemporal = [];

        function agregarAlKardex() {
            const prod = document.getElementById('producto').value;
            const basico = parseFloat(document.getElementById('stockBasico').value) || 0;
            const inicial = parseFloat(document.getElementById('invInicial').value) || 0;
            const ent = parseFloat(document.getElementById('entradas').value) || 0;
            const sal = parseFloat(document.getElementById('salidas').value) || 0;

            if(!prod) return alert("Ingresa el nombre del producto");

            // Lógica: Existencia actual en máquina
            const existencia = inicial + ent - sal;
            // Lógica: Diferencial para llegar al stock de reserva
            const faltante = basico > existencia ? (basico - existencia) : 0;

            const item = {
                producto: prod,
                reserva: basico,
                existencia: existencia,
                faltante: faltante
            };

            inventarioTemporal.push(item);
            actualizarTabla();
            limpiarCampos();
        }

        function actualizarTabla() {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = "";
            inventarioTemporal.forEach(item => {
                cuerpo.innerHTML += `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-3 border">${item.producto}</td>
                        <td class="p-3 border text-center font-bold">${item.reserva}</td>
                        <td class="p-3 border text-center text-blue-600 font-bold">${item.existencia}</td>
                        <td class="p-3 border text-center text-red-600 font-bold">${item.faltante}</td>
                    </tr>
                `;
            });
        }

        function exportarExcel() {
            if(inventarioTemporal.length === 0) return alert("No hay datos para exportar");
            
            const ws = XLSX.utils.json_to_sheet(inventarioTemporal);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventario_Kardex");
            XLSX.writeFile(wb, "Kardex_Materia_Prima.xlsx");
        }

        function enviarWhatsApp() {
            if(inventarioTemporal.length === 0) return alert("No hay pedidos pendientes");

            let mensaje = `*PEDIDO DE REPOSICIÓN (VIBRAS POSITIVAS)*%0A`;
            mensaje += `-----------------------------------%0A`;
            
            inventarioTemporal.forEach(item => {
                if(item.faltante > 0) {
                    mensaje += `• *${item.producto}*: Solicitar *${item.faltante}* unid.%0A`;
                }
            });

            const numero = "3117700431"; 
            window.open(`https://wa.me/${numero}?text=${mensaje}`, '_blank');
        }

        function limpiarCampos() {
            document.getElementById('producto').value = "";
            document.getElementById('invInicial').value = "0";
            document.getElementById('entradas').value = "0";
            document.getElementById('salidas').value = "0";
        }
    </script>
</body>
</html>
